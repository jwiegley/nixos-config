groups:
  - name: perplexica_alerts
    interval: 60s
    rules:
      # Perplexica Container Service Alerts
      - alert: PerplexicaServiceDown
        expr: |
          systemd_unit_state{
            name="perplexica.service",
            state="active",
            type="service"
          } == 0
        for: 3m
        labels:
          severity: critical
          category: ai-search
          service: perplexica
        annotations:
          summary: "Perplexica service is down"
          description: "Perplexica AI search container is not active. Service is unavailable."

      - alert: PerplexicaServiceFailed
        expr: |
          systemd_unit_state{
            name="perplexica.service",
            state="failed",
            type="service"
          } == 1
        for: 1m
        labels:
          severity: critical
          category: ai-search
          service: perplexica
        annotations:
          summary: "Perplexica service has failed"
          description: "Perplexica container is in failed state. Check logs with: journalctl -u perplexica"

      # HTTP Health Check (via blackbox exporter)
      - alert: PerplexicaHTTPDown
        expr: |
          probe_success{job="blackbox_https_local", instance=~".*perplexica.*"} == 0
        for: 5m
        labels:
          severity: critical
          category: ai-search
          service: perplexica
        annotations:
          summary: "Perplexica HTTP endpoint is unreachable"
          description: "Perplexica web interface at {{ $labels.instance }} has been unreachable for more than 5 minutes."

      # SSL Certificate Alerts
      - alert: PerplexicaCertificateExpiringSoon
        expr: |
          certificate_days_until_expiry{name="perplexica.vulcan.lan"} <= 30
          and
          certificate_days_until_expiry{name="perplexica.vulcan.lan"} > 7
        for: 1h
        labels:
          severity: warning
          category: certificates
          service: perplexica
        annotations:
          summary: "Perplexica SSL certificate expiring soon"
          description: "SSL certificate for perplexica.vulcan.lan expires in {{ $value }} days. Run certificate renewal."

      - alert: PerplexicaCertificateExpiryCritical
        expr: |
          certificate_days_until_expiry{name="perplexica.vulcan.lan"} <= 7
        for: 30m
        labels:
          severity: critical
          category: certificates
          service: perplexica
        annotations:
          summary: "Perplexica SSL certificate expiring very soon"
          description: "SSL certificate for perplexica.vulcan.lan expires in {{ $value }} days. Immediate renewal required."
